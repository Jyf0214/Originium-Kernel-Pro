name: "Qwen Scheduled Bug Hunter - Inspector"

on:
  schedule:
    # 每周日凌晨 00:00 (UTC) 定时自动拉起深层巡检
    - cron: '0 0 * * 0'
  workflow_dispatch: # 支持手动一键触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scheduled-inspect:
    runs-on: self-hosted

    permissions:
      contents: write      # 用于向仓库推送修复分支
      pull-requests: write # 用于自动创建 PR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Environment (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install TypeScript Language Server for LSP Support
        run: |
          npm install -g typescript-language-server typescript

      - name: Install Qwen Code CLI Globally
        run: npm install -g @qwen-code/qwen-code@latest

      # 物理防线：注入本地 Git 钩子，绝对禁止直推主分支
      - name: Enforce Local Branch Protection (Git Hook Security)
        run: |
          mkdir -p .git/hooks
          cat << 'EOF' > .git/hooks/pre-push
          #!/bin/sh
          while read local_ref local_sha remote_ref remote_sha
          do
            if [ "$remote_ref" = "refs/heads/main" ] || [ "$remote_ref" = "refs/heads/master" ]; then
              echo "========================================================="
              echo " [SECURITY ERROR] Direct push to main/master is PROHIBITED!"
              echo "========================================================="
              exit 1
            fi
          done
          exit 0
          EOF
          chmod +x .git/hooks/pre-push

      # 安全恢复会话缓存
      - name: Restore Qwen Secure Session Cache
        id: cache-qwen
        uses: actions/cache@v4
        with:
          path: ~/.qwen
          key: qwen-session-scheduled-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            qwen-session-scheduled-${{ github.run_id }}-

      # 配置读取：写入 Qwen 全局配置
      - name: Configure Qwen Settings
        run: |
          mkdir -p ~/.qwen
          cat << 'EOF' > ~/.qwen/settings.json
          ${{ secrets.QWEN_SETTINGS_JSON }}
          EOF

      # 创建 LSP 运行时配置
      - name: Create LSP Server Configuration
        run: |
          cat << 'EOF' > .lsp.json
          {
            "typescript": {
              "command": "typescript-language-server",
              "args": ["--stdio"],
              "extensionToLanguage": {
                ".ts": "typescript",
                ".tsx": "typescriptreact",
                ".js": "javascript",
                ".jsx": "javascriptreact"
              }
            }
          }
          EOF

      # 执行巡检
      - name: Run Deep Inspection
        env:
          UNLIMITED_OPENAI_API_KEY: ${{ secrets.UNLIMITED_OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -o pipefail
          export NODE_PENDING_DEPRECATION=0
          export QWEN_CODE_UNATTENDED_RETRY=1
          export QWEN_CODE_SUPPRESS_YOLO_WARNING=1
          
          MAX_ATTEMPTS=5
          ATTEMPT=1
          SUCCESS=false
          TRIGGER_COMPRESSION=false
          
          CURRENT_DATE=$(date +%Y%m%d)
          echo "Scheduled Inspection Date: $CURRENT_DATE"

          # 自动探测远程分支名是否冲突，避免覆盖已有 PR 分支
          BASE_BRANCH="scheduled/audit-patch-$CURRENT_DATE"
          PR_BRANCH="$BASE_BRANCH"
          SUFFIX=1
          echo "正在探测远程分支是否重名冲突..."
          while git ls-remote --heads origin "refs/heads/$PR_BRANCH" | grep -q "$PR_BRANCH"; do
            PR_BRANCH="${BASE_BRANCH}-${SUFFIX}"
            SUFFIX=$((SUFFIX + 1))
          done
          echo "物理分支名无冲突，初始化为: $PR_BRANCH"

          # 准备会话 ID（支持 Run-Attempt 级错误重试，否则一律强制为 Clean 模式）
          mkdir -p ~/.qwen
          BRANCH_NAME_SAFE=$(echo "$PR_BRANCH" | sed 's/[^a-zA-Z0-9_.-]/_/g')
          SESSION_ID=""
          IS_RESUME=false

          if [ "$GITHUB_RUN_ATTEMPT" -gt 1 ] && [ -f ~/.qwen/session_branch_${BRANCH_NAME_SAFE}.txt ]; then
            SESSION_ID=$(cat ~/.qwen/session_branch_${BRANCH_NAME_SAFE}.txt)
            IS_RESUME=true
            echo "检测到工作流重新尝试 (Retry Attempt)，载入已有会话 ID: $SESSION_ID"
          else
            SESSION_ID=$(cat /proc/sys/kernel/random/uuid 2>/dev/null || uuidgen 2>/dev/null || echo "session-$(date +%s)")
            echo "$SESSION_ID" > ~/.qwen/session_branch_${BRANCH_NAME_SAFE}.txt
            IS_RESUME=false
            echo "强制初始化全新 Qwen 巡检会话 ID: $SESSION_ID"
          fi

          # 构建专注于深度排查与任务墙创制的 Prompt（无需混杂 Git 冲突内容）
          cat << 'EOF' > prompt.txt
          /goal 启动本周度项目代码库安全隐患与逻辑缺陷的【分布式深度排查与并行自愈】任务。

          ## 【PR 创制原子性硬防线（核心限制）】（硬性红线）：
          - 当你运行 'gh pr create' 创建 PR 时，严禁使用 'placeholder' 等空洞字面量来填充 PR Body（描述）。
          - 你必须首先在项目工作区本地生成写好的、详尽的整个《漏洞档案分析报告》（包含漏洞排查明细、修复细节、测试通过证明等），将其保存为一个物理文件 'pr_description.md'。
          - 随后，你必须直接使用带有文件引用参数的命令进行原子创建：'gh pr create --title "..." --body-file pr_description.md'。这样可以确保 PR 建立的一瞬间便具备最完整、最高质的内容结构，防止后续进程因为被中断而留下残留草稿。

          ## 【Orchestrator 调度与 Subagents 并行协同设计】：
          作为一个具备高级调度能力的总协调器（Orchestrator），你必须调用系统内置的 'task' 工具，并发分派子任务给专门的子智能体（Subagents）执行，禁止单兵作战：
          1. **第一阶段：并行分布式审计（Parallel Scanning）**：
             你必须通过并发调用 'task' 工具，分派以下独立的 'Explore' 子智能体开展分析：
             - 指派子智能体 A (subagent_type: 'Explore')：扫描所有控制器与路由端点，分析并审计是否存在越权访问、鉴权绕过、信息泄露或未授权的操作。
             - 指派子智能体 B (subagent_type: 'Explore')：重点扫描涉及数据库、文件系统、动态代码执行、以及用户输入流的核心模块，排查 SQLi、路径穿越（Path Traversal）、命令注入等严重漏洞。
             - 指派子智能体 C (subagent_type: 'Explore')：扫描项目整体代码库，排查已知 Bug、死锁隐患、未捕获的边界异常、TODO/FIXME 标记等业务稳定性漏洞。
          2. **第二阶段：建立物理任务墙（todo_checklist.md）**：
             - 收集上述所有 'Explore' 子智能体返回的审计报告，汇总其发现的所有中高危安全和逻辑漏洞。
             - 在项目工作区根目录下新建一个物理文件 'todo_checklist.md'。将发现的所有 Bug 漏洞整理成带有 '[ ]' 复选框的任务清单，建立漏洞档案。
          3. **第三阶段：分布式并行自愈（Parallel Healing）**：
             - 针对清单中所有的中高危漏洞，你必须再次分派多个独立的研发子智能体 (subagent_type: 'general-purpose') 分头对不同的受影响文件进行修改和修复。
             - 每当一个子智能体反馈修复成功，你必须亲自运行本地单元测试，确认没有引入退化问题。
             - 确认修复且通过测试后，将 'todo_checklist.md' 中对应的 '[ ]' 修改为 '[x]'。
          4. **第四阶段：PR 出库与生动报告**：
             - 切出巡检分支并将修改推送，自动使用 'gh pr create' 发起 PR（必须严格遵守上述原子性硬防线限制）。
             - PR 描述中必须详尽贴出你的《漏洞档案分析报告》。
             - 在原 PR 下面，以极富开发者温度（添加Emoji、谢绝死板机器人腔调）的语言生动评论说明每一项漏洞的排查 and 修复细节。

          ## 【LLM Judge 判定终态硬红线（必须 100% 达成）】：
          - 裁判模型在进行 Goal Check 时，必须强制读取 'todo_checklist.md'。
          - 只有确保清单中列出的所有漏洞都已被针对性修复，全部打勾销项为 '[x]'，且测试命令 100% 成功通过，才能判定为【已达成（Goal Met）】。否则一律判为【未达成（Goal Not Met）】，并指示你继续修复剩下的未打勾漏洞。

          ## 安全限制：
          - 严禁直接向主分支（main/master）提交 commit 或执行 push 操作。
          EOF

          FINAL_PROMPT="$(cat prompt.txt)"
          RESUME_PROMPT="由于网络或上下文限制中断，请读取巡检历史会话并继续完成所有步骤。请注意：必须对照 todo_checklist.md 继续修复未打勾的项，在本地运行并成功通过单元测试，确认无误后完成代码提交与 PR 处理。最后通过 gh 提交生动活泼的说明回复。"

          # 执行 Qwen
          if [ "$IS_RESUME" = "true" ]; then
            if qwen --approval-mode yolo --experimental-lsp --max-session-turns 150 --max-tool-calls -1 --resume "$SESSION_ID" -p "$FINAL_PROMPT" 2>&1 | tee qwen_output.log; then
              SUCCESS=true
            else
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              if [ $DURATION -ge 1200 ] || grep -q -E "524|terminated|closed" qwen_output.log; then
                TRIGGER_COMPRESSION=true
              fi
            fi
          else
            if qwen --approval-mode yolo --experimental-lsp --max-session-turns 150 --max-tool-calls -1 --session-id "$SESSION_ID" -p "$FINAL_PROMPT" 2>&1 | tee qwen_output.log; then
              SUCCESS=true
            else
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              if [ $DURATION -ge 1200 ] || grep -q -E "524|terminated|closed" qwen_output.log; then
                TRIGGER_COMPRESSION=true
              fi
            fi
          fi

          # 首轮耗时防御判定
          if [ "$SUCCESS" = "true" ] && [ $(( $(date +%s) - START_TIME )) -lt 1200 ]; then
            echo "::warning:: 巡检耗时过短，判定可能存在排查不足！正在启动第二轮【极深度底层漏洞会诊机制】..."
            DEEPER_GOAL="/goal 已经完成了初步修复，但为了确保没有遗漏，你现在必须执行【第二轮极深度的底层漏洞会诊】。请使用 Explore 并发扫描所有核心目录，寻找更隐蔽的安全漏洞或稳定缺陷，将它们追加到 'todo_checklist.md' 列表中打勾销项。直接把修改推送到现有的巡检分支上以更新 PR，并在原 PR 下面生动追加你的第二轮扫描与修复总结。"
            SUCCESS=false
            START_TIME=$(date +%s)
            if qwen --approval-mode yolo --experimental-lsp --max-session-turns 150 --max-tool-calls -1 --resume "$SESSION_ID" -p "$DEEPER_GOAL" 2>&1 | tee qwen_output.log; then
              SUCCESS=true
            fi
          fi

          # 弹性自愈断点续传循环
          while [ "$SUCCESS" = false ] && [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            sleep 15
            if [ "$TRIGGER_COMPRESSION" = true ]; then
              if [ "$ATTEMPT" = 2 ]; then
                qwen --approval-mode yolo --experimental-lsp --max-session-turns 150 --max-tool-calls -1 --resume "$SESSION_ID" -p "/compress-fast" || true
              elif [ "$ATTEMPT" -ge 3 ]; then
                qwen --approval-mode yolo --experimental-lsp --max-session-turns 150 --max-tool-calls -1 --resume "$SESSION_ID" -p "/compress-fast" || true
                sleep 5
                qwen --approval-mode yolo --experimental-lsp --max-session-turns 150 --max-tool-calls -1 --resume "$SESSION_ID" -p "/compress" || true
              fi
            fi
            START_TIME=$(date +%s)
            if qwen --approval-mode yolo --experimental-lsp --max-session-turns 150 --max-tool-calls -1 --resume "$SESSION_ID" -p "$RESUME_PROMPT" 2>&1 | tee qwen_output.log; then
              SUCCESS=true
            else
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              if [ $DURATION -ge 1200 ] || grep -q -E "524|terminated|closed" qwen_output.log; then
                TRIGGER_COMPRESSION=true
              fi
            fi
          done

          if [ "$SUCCESS" = false ]; then
            exit 1
          fi