name: "Qwen AI Security Auditor"

on:
  pull_request:
    types: [opened, synchronize] # 当 PR 创建或有新提交推送时触发审计

concurrency:
  # PR 维度并发控制：当同个 PR 连续推送新 Commit 时，自动取消旧的审计任务，避免数据库锁死与资源浪费
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-audit:
    runs-on: self-hosted

    permissions:
      contents: write      # 用于读取 Git commit 历史与推送
      issues: write        # 用于向 PR 发表审计报告评论
      pull-requests: write # 用于更新 PR 状态与发表评论

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以进行差异对比

      - name: Set up Environment (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 安装 TypeScript 语言服务（确保审计时能进行全项目语义跨文件分析）
      - name: Install TypeScript Language Server for LSP Support
        run: |
          npm install -g typescript-language-server typescript

      - name: Install Qwen Code CLI Globally
        run: npm install -g @qwen-code/qwen-code@latest

      # 物理防线：注入本地 Git 钩子，绝对禁止直推主分支
      - name: Enforce Local Branch Protection (Git Hook Security)
        run: |
          mkdir -p .git/hooks
          cat << 'EOF' > .git/hooks/pre-push
          #!/bin/sh
          while read local_ref local_sha remote_ref remote_sha
          do
            if [ "$remote_ref" = "refs/heads/main" ] || [ "$remote_ref" = "refs/heads/master" ]; then
              echo "========================================================="
              echo " [SECURITY ERROR] Direct push to main/master is PROHIBITED!"
              echo "========================================================="
              exit 1
            fi
          done
          exit 0
          EOF
          chmod +x .git/hooks/pre-push

      # 安全隔离与恢复：恢复审计器的专属加密缓存
      - name: Restore Qwen Auditor Secure Cache
        id: cache-auditor
        uses: actions/cache@v4
        with:
          path: ~/.qwen
          key: qwen-audit-issue-${{ github.event.pull_request.number }}-${{ github.run_id }}
          restore-keys: |
            qwen-audit-issue-${{ github.event.pull_request.number }}-

      # 配置读取：写入 Qwen 全局配置
      - name: Configure Qwen Settings
        run: |
          mkdir -p ~/.qwen
          cat << 'EOF' > ~/.qwen/settings.json
          ${{ secrets.QWEN_SETTINGS_JSON }}
          EOF

      # 创建 LSP 运行时配置
      - name: Create LSP Server Configuration
        run: |
          cat << 'EOF' > .lsp.json
          {
            "typescript": {
              "command": "typescript-language-server",
              "args": ["--stdio"],
              "extensionToLanguage": {
                ".ts": "typescript",
                ".tsx": "typescriptreact",
                ".js": "javascript",
                ".jsx": "javascriptreact"
              }
            }
          }
          EOF

      # 执行自愈式安全审计逻辑
      - name: Run Qwen AI Code Vulnerability Audit
        env:
          UNLIMITED_OPENAI_API_KEY: ${{ secrets.UNLIMITED_OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -o pipefail
          export NODE_PENDING_DEPRECATION=0
          export QWEN_CODE_UNATTENDED_RETRY=1
          export QWEN_CODE_SUPPRESS_YOLO_WARNING=1
          
          # 确保全局目录 ~/.qwen 存在
          mkdir -p ~/.qwen
          
          # 1. 恢复或创建 Auditor 的从属 Session ID
          if [ -f ~/.qwen/current_session_id.txt ]; then
            SESSION_ID=$(cat ~/.qwen/current_session_id.txt)
            IS_RESUME=true
            echo "Successfully loaded persistent Session ID: $SESSION_ID (Incremental Audit Mode)"
          else
            SESSION_ID=$(cat /proc/sys/kernel/random/uuid)
            echo "$SESSION_ID" > ~/.qwen/current_session_id.txt
            IS_RESUME=false
            echo "Created brand new Session ID: $SESSION_ID (First-run Audit Mode)"
          fi
          
          # 2. 防死循环判定：通过 git log 检查最后一次 Commit 是否由 AI Bot 提交
          LAST_COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
          echo "Last commit author detected: $LAST_COMMIT_AUTHOR"
          
          if [ -f ~/.qwen/audit_count.txt ]; then
            CYCLE_COUNT=$(cat ~/.qwen/audit_count.txt)
          else
            CYCLE_COUNT=0
          fi
          
          if [[ "$LAST_COMMIT_AUTHOR" == *"bot"* ]] || [[ "$LAST_COMMIT_AUTHOR" == *"github-actions"* ]]; then
            CYCLE_COUNT=$((CYCLE_COUNT + 1))
            echo "Incrementing AI Auto-Fix Cycle Count: $CYCLE_COUNT"
          else
            CYCLE_COUNT=0
            echo "Resetting AI Cycle Count to 0 (Human commit detected)."
          fi
          echo "$CYCLE_COUNT" > ~/.qwen/audit_count.txt
          
          # 获取主分支最新数据以支持差异对比
          git fetch origin "$BASE_REF"
          
          # 清除上一次运行可能残留的文件
          rm -f audit_report.txt audit_passed.txt
          
          # 3. 编写深层全项目审计 Prompt（增加明确的文件输出判定硬红线）
          PROMPT="
          /goal 审查本次 Pull Request 中改动的部分，排查其是否引入了新的高风险安全漏洞。
          
          ## 核心审计方法（全项目关联分析要求）：
          1. **差异锁定**：通过运行 'git diff origin/$BASE_REF...HEAD'，锁定变动的文件和修改的文件段落。
          2. **跨文件深度追踪（核心要求）**：
             - 严禁孤立分析修改行！你必须通过 '--experimental-lsp' 的语义追踪能力，查看修改的接口/函数是如何在项目中被路由、控制器或公共适配器调用的。
             - **路由路径排查**：分析修改的接口是否绕过了全局鉴权中间件或路由限制，是否存在未授权访问漏洞。
             - **穿越与文件访问**：如果是文件读写操作，追踪输入源，检查是否引入了路径穿越漏洞（Path Traversal）。
             - **输入安全**：排查 SQL 语句、命令执行、HTML 渲染中，由于新增或重构代码是否引入了 SQLi、命令注入或 XSS。
          3. **差异关注**：只关注本次 PR **新引入或由于修改而恶化** 的漏洞。不要去报告项目中原本就存在且与本次修改无关的历史漏洞。
          
          ## 漏洞判定与物理输出（必须遵循以下红线）：
          你必须且仅能输出以下两类文件中的【一个】用于 CI/CD 的状态检测：
          
          1. **情况 A：若发现新增的高风险安全缺陷（审计不通过）**：
             - 你必须直接在当前工作区根目录下创建并写入文件 'audit_report.txt'。
             - 审计报告必须写得专业、清晰，指出代码漏洞的具体行、成因、潜在危害以及具体的修复指导方案。
             - 此时绝对不要生成 'audit_passed.txt'。
             
          2. **情况 B：若确认此 PR 未引入任何高风险安全缺陷（审计通过）**：
             - 你必须直接在当前工作区根目录下创建并写入文件 'audit_passed.txt'。
             - 在其中简述你的评估依据与全项目语义对比结果（例如用 Markdown 表格列出改动文件的安全判定详情，说明为何它们是安全的）。
             - 此时绝对不要生成 'audit_report.txt'。
          "
          
          # 4. 执行审计（采用官方标准的 yolo 模式及 -p 参数）
          if [ "$IS_RESUME" = "true" ]; then
            echo "Executing Security Audit in RESUME mode using --resume..."
            qwen --approval-mode yolo --experimental-lsp --max-session-turns 100 --max-tool-calls -1 --resume "$SESSION_ID" -p "$PROMPT"
          else
            echo "Executing Security Audit in INITIAL mode using --session-id..."
            qwen --approval-mode yolo --experimental-lsp --max-session-turns 100 --max-tool-calls -1 --session-id "$SESSION_ID" -p "$PROMPT"
          fi
          
          # 5. 判定审计结果与闭环触发
          if [ -f audit_report.txt ]; then
            echo "::error:: Security vulnerabilities detected!"
            REPORT_CONTENT=$(cat audit_report.txt)
            
            if [ $CYCLE_COUNT -lt 5 ]; then
              # 生成触发 AI 修复流程的评论（带指派指令）
              COMMENT_BODY="### 🚨 安全审计未通过（第 $CYCLE_COUNT/5 轮自愈）

              @qwen-code /fix [AI 自动审计警告]
              当前 PR 引入了高风险安全漏洞。请立刻分析以下报告，并在当前分支上修复这些问题：

              \`\`\`markdown
              $REPORT_CONTENT
              \`\`\`"
              
              gh pr comment ${{ env.PR_NUMBER }} --body "$COMMENT_BODY"
            else
              # 熔断机制：达到 5 次，不再派发给 AI，召唤真人
              COMMENT_BODY="### ❌ 安全审计失败（已触发熔断保护）

              当前 PR 仍然存在安全缺陷，且已达到最大 AI 自动修复循环上限（5次）。
              请人类开发人员介入进行人工审查和修复：

              \`\`\`markdown
              $REPORT_CONTENT
              \`\`\`"
              
              gh pr comment ${{ env.PR_NUMBER }} --body "$COMMENT_BODY"
            fi
            
            # 让 Status Check 变红失败，阻止 PR 合并
            exit 1
          elif [ -f audit_passed.txt ]; then
            # 审计通过，在 PR 下发表绿色安全加固通过报告
            echo "Security audit passed successfully."
            PASSED_CONTENT=$(cat audit_passed.txt)
            
            COMMENT_BODY="### ✅ AI 安全审计通过

            经跨文件深度追踪与全项目关联分析，本次 PR 安全合规，未发现引入高风险缺陷。改动判定摘要如下：

            $PASSED_CONTENT"
            
            gh pr comment ${{ env.PR_NUMBER }} --body "$COMMENT_BODY"
            exit 0
          else
            # 兜底通过评论
            echo "Security audit passed with fallback."
            COMMENT_BODY="### ✅ AI 安全审计通过
            
            经全项目语义关联分析，本次 PR 安全合规，未发现高风险漏洞隐患。"
            
            gh pr comment ${{ env.PR_NUMBER }} --body "$COMMENT_BODY"
            exit 0
          fi