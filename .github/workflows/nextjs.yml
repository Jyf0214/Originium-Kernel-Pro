# Deploy blog to GitHub Pages (static export)
#
# 通过 NEXT_STATIC_EXPORT=true 环境变量启用静态导出模式，
# 控制 output: 'export'、trailingSlash、images.unoptimized 等配置。
# filter-db-routes.mjs 在构建前移除所有数据库依赖路由目录，
# configure-pages@v5 自动注入 output: 'export' 和 images.unoptimized。
#
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      - name: Generate static data
        run: node scripts/generate-navigation.mjs && node scripts/generate-site-config-ts.mjs && node scripts/generate-version.mjs
      - name: Filter routes for GitHub Pages
        run: node scripts/filter-db-routes.mjs
      - name: Build with Next.js
        run: ${{ steps.detect-package-manager.outputs.runner }} next build --webpack
        env:
          NEXT_STATIC_EXPORT: 'true'
      - name: Restore routes
        run: node scripts/restore-db-routes.mjs
        if: always()
      - name: Stamp SW cache version
        run: |
          HASH=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s/originium-v1/originium-${HASH}/g" out/sw.js
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
